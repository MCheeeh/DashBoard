<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ajouter des Items</title>

<style>
    body { font-family: Arial; background:#f5f5f5; margin:0; }
    header { background:#003366; color:white; padding:20px; text-align:center; }

    nav {
        background:#002244;
        padding:10px;
        text-align:center;
    }
    nav a {
        color:white;
        margin:0 20px;
        text-decoration:none;
        font-weight:bold;
    }

    .container {
        background:white;
        width:600px;
        margin:40px auto;
        padding:20px;
        border-radius:10px;
        box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    textarea {
        width:100%;
        height:200px;
        padding:10px;
        border-radius:5px;
        border:1px solid #ccc;
        font-family: monospace;
        box-sizing: border-box;
        font-size: 14px;
    }

    button {
        width:100%;
        padding:12px;
        background:#003366;
        color:white;
        border:none;
        border-radius:5px;
        font-size:16px;
        cursor:pointer;
        margin-top:15px;
        transition: background 0.3s;
        font-weight: bold;
    }

    button:hover {
        background:#002244;
    }

    button:disabled {
        background:#cccccc;
        cursor:not-allowed;
    }

    .status {
        margin-top:15px;
        padding:12px;
        border-radius:5px;
        display:none;
        font-weight: bold;
        text-align: center;
    }

    .status.success {
        background:#d4edda;
        color:#155724;
        border:1px solid #c3e6cb;
        display:block;
    }

    .status.error {
        background:#f8d7da;
        color:#721c24;
        border:1px solid #f5c6cb;
        display:block;
    }

    .info {
        background:#e7f3ff;
        color:#004085;
        border:1px solid #b3d9ff;
        padding:10px;
        border-radius:5px;
        margin-bottom:15px;
        font-size: 14px;
    }

    .clear-btn {
        background:#dc3545;
        margin-top: 10px;
        width: 48%;
        display: inline-block;
        margin-right: 2%;
    }

    .clear-btn:hover {
        background:#c82333;
    }
</style>
</head>

<body>

<header>
    <h1>Ajouter des Items</h1>
</header>

<nav>
    <a href="index.html">Dashboard</a>
    <a href="form.html">Ajouter un item</a>
</nav>

<div class="container">
    <h3>Collez ici les lignes de votre Google Sheet :</h3>
    <p>(Copiez plusieurs lignes → Ctrl+C → collez ici → Valider)</p>

    <div class="info">
        ℹ️ Format attendu (séparé par des tabulations):
        <br>N° Item | ITEM | Status | Action | Pilot | Due date | Done date | Comment | Links
    </div>

    <textarea id="sheetInput" placeholder="Collez vos données ici..."></textarea>

    <button id="submitBtn" onclick="sendItems()">✅ Ajouter les items</button>
    <button class="clear-btn" onclick="clearData()">🗑️ Supprimer tout</button>

    <div id="statusMessage" class="status"></div>
</div>

<script>

function sendItems() {
    const raw = document.getElementById("sheetInput").value.trim();
    const btn = document.getElementById("submitBtn");
    const statusDiv = document.getElementById("statusMessage");

    if (!raw) {
        showStatus("❌ Veuillez coller des lignes.", "error");
        return;
    }

    btn.disabled = true;
    btn.textContent = "⏳ Ajout en cours...";
    statusDiv.className = "status";

    const lines = raw.split("\n").filter(line => line.trim());
    const newItems = [];

    for (let i = 0; i < lines.length; i++) {
        const cols = lines[i].split("\t");
        const item = {
            "N° Item": cols[0] || "",
            "ITEM": cols[1] || "",
            "Status": cols[2] || "",
            "Action": cols[3] || "",
            "Pilot": cols[4] || "",
            "Due date": cols[5] || "",
            "Done date": cols[6] || "",
            "Comment": cols[7] || "",
            "Links": cols[8] || ""
        };
        newItems.push(item);
    }

    // Récupérer les données existantes
    const existingItems = JSON.parse(localStorage.getItem('dashboardItems')) || [];
    
    // Ajouter les nouveaux items
    const allItems = [...existingItems, ...newItems];
    
    // Sauvegarder dans localStorage
    localStorage.setItem('dashboardItems', JSON.stringify(allItems));

    console.log("✅ Items sauvegardés:", allItems);

    showStatus(`✅ ${newItems.length} item(s) ajouté(s) avec succès! Redirection...`, "success");
    
    // Rediriger vers le dashboard après 2 secondes
    setTimeout(() => {
        window.location.href = "index.html";
    }, 2000);

    btn.disabled = false;
    btn.textContent = "✅ Ajouter les items";
    document.getElementById("sheetInput").value = "";
}

function clearData() {
    if (confirm("⚠️ Êtes-vous sûr? Cela supprimera TOUS les items!")) {
        localStorage.removeItem('dashboardItems');
        showStatus("🗑️ Tous les items ont été supprimés!", "success");
        setTimeout(() => {
            window.location.href = "index.html";
        }, 1500);
    }
}

function showStatus(message, type) {
    const statusDiv = document.getElementById("statusMessage");
    statusDiv.textContent = message;
    statusDiv.className = `status ${type}`;
}

</script>

</body>
</html>
