<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Form</title>
</head>
<body>
    <h1>Submit Your Items</h1>
    <form id="itemForm">
        <label for="itemName">Item Name:</label>
        <input type="text" id="itemName" name="itemName" required>
        <br>
        <input type="submit" value="Submit">
    </form>
    <div id="feedback" style="color: red;"></div>
    <script>
        document.getElementById('itemForm').addEventListener('submit', function(event) {
            event.preventDefault();
            sendItems();
        });

        function sendItems() {
            const itemName = document.getElementById('itemName').value;
            const feedbackDiv = document.getElementById('feedback');

            if (!itemName) {
                feedbackDiv.innerText = 'Item name is required!';
                return;
            }

            fetch('https://api.example.com/items', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Access-Control-Allow-Origin': '*',
                },
                body: JSON.stringify({ name: itemName })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok: ' + response.statusText);
                }
                return response.json();
            })
            .then(data => {
                feedbackDiv.innerText = 'Item submitted successfully! ID: ' + data.id;
            })
            .catch(error => {
                feedbackDiv.innerText = 'There was a problem with your submission: ' + error;
            });
        }
    </script>
</body>
</html>
