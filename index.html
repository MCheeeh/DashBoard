<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Projet - Suivi des Tâches</title>

    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
        header { background: #003366; color: white; padding: 20px; text-align: center; }

        nav {
            background:#002244;
            padding:10px;
            text-align:center;
        }
        nav a {
            color:white;
            margin:0 20px;
            text-decoration:none;
            font-weight:bold;
        }

        h2 { margin-top: 40px; text-align: center; }

        .kpi-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin: 30px;
        }

        .kpi {
            background: white;
            padding: 20px;
            width: 180px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 18px;
        }

        .progress-bar-container {
            width: 60%;
            margin: 20px auto;
            background: #ddd;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 25px;
            background: #4CAF50;
            width: 0%;
            text-align: center;
            color: white;
            font-weight: bold;
        }

        table {
            width: 95%;
            margin: 30px auto;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #003366;
            color: white;
        }

        tr:hover {
            background: #f0f0f0;
        }
    </style>
</head>

<body>

<header>
    <h1>Tableau de Bord - Suivi du Projet</h1>
</header>

<nav>
    <a href="index.html">Dashboard</a>
    <a href="form.html">Ajouter un item</a>
</nav>

<h2>Indicateurs Clés (KPI)</h2>

<div class="kpi-container">
    <div class="kpi">Total tâches<br><b id="kpi-total">0</b></div>
    <div class="kpi">Closed<br><b id="kpi-closed">0</b></div>
    <div class="kpi">Work In Progress<br><b id="kpi-wip">0</b></div>
    <div class="kpi">To Start<br><b id="kpi-start">0</b></div>
    <div class="kpi">En retard<br><b id="kpi-late">0</b></div>
</div>

<h2>Avancement Global</h2>

<div class="progress-bar-container">
    <div class="progress-bar" id="progress-bar">0%</div>
</div>

<h2>Liste des Tâches</h2>

<table id="task-table">
    <thead>
        <tr>
            <th>N°</th>
            <th>Action</th>
            <th>Pilote</th>
            <th>Status</th>
            <th>Due date</th>
            <th>Done date</th>
            <th>Comment</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
const API_URL = "https://script.google.com/a/macros/valeo.com/s/AKfycbw3Cb9I4uZrKfXwZwJSn9vuJsqAESU2ewh5THLCOYxJ3S1_cqTTAdNUM1pZnVZ-MMmo/exec";

// Charge les données TSV
async function loadData() {
    const response = await fetch(API_URL);
    const text = await response.text();

    const lines = text.trim().split("\n");
    const rows = lines.map(line => line.split("\t"));

    const headers = rows[0].map(h => h.trim());

    const data = rows.slice(1).map(row => {
        let obj = {};
        headers.forEach((h, i) => obj[h] = (row[i] || "").trim());
        return obj;
    });

    displayKPIs(data);
    displayTable(data);
}

function displayKPIs(data) {
    const total = data.length;

    const closed = data.filter(t => t["Status"] === "Closed").length;
    const wip = data.filter(t => t["Status"] === "Work In Progress").length;
    const start = data.filter(t => t["Status"] === "To start").length;

    const late = data.filter(t => {
        const d = t["Due date"];
        if (!d || t["Status"] === "Closed") return false;
        const due = parseDate(d);
        return due && due < new Date();
    }).length;

    const progress = total > 0 ? Math.round((closed / total) * 100) : 0;

    document.getElementById("kpi-total").textContent = total;
    document.getElementById("kpi-closed").textContent = closed;
    document.getElementById("kpi-wip").textContent = wip;
    document.getElementById("kpi-start").textContent = start;
    document.getElementById("kpi-late").textContent = late;

    const bar = document.getElementById("progress-bar");
    bar.style.width = progress + "%";
    bar.textContent = progress + "%";
}

function parseDate(str) {
    if (!str) return null;
    const p = str.split("/");
    if (p.length !== 3) return null;
    return new Date(p[2], p[1] - 1, p[0]);
}

function displayTable(data) {
    const tbody = document.querySelector("#task-table tbody");
    tbody.innerHTML = "";

    data.forEach(row => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${row["N° Item"] || ""}</td>
            <td>${row["Action"] || ""}</td>
            <td>${row["Pilot"] || ""}</td>
            <td>${row["Status"] || ""}</td>
            <td>${row["Due date"] || ""}</td>
            <td>${row["Done date"] || ""}</td>
            <td>${row["Comment"] || ""}</td>
        `;

        tbody.appendChild(tr);
    });
}

loadData();
</script>

</body>
</html>
