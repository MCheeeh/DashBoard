<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard Projet</title>

<style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }
    header { background:#003366; color:white; padding:20px; text-align:center; }
    nav { background:#002244; padding:10px; text-align:center; }
    nav a { color:white; margin:0 20px; text-decoration:none; font-weight:bold; }

    .kpi-container { display:flex; justify-content:center; gap:20px; margin:30px; flex-wrap:wrap; }
    .kpi { background:white; padding:20px; width:180px; text-align:center; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }

    table { width:95%; margin:30px auto; border-collapse:collapse; background:white; border-radius:10px; overflow:hidden; }
    th, td { padding:10px; border-bottom:1px solid #ddd; }
    th { background:#003366; color:white; }

    .loading { text-align: center; font-size: 18px; color: #666; margin: 50px; }
    .error { text-align: center; font-size: 18px; color: red; margin: 50px; }
</style>
</head>

<body>

<header>
    <h1>Dashboard Projet</h1>
</header>

<nav>
    <a href="index.html">Dashboard</a>
    <a href="form.html">Ajouter un item</a>
</nav>

<h2 style="text-align:center;">Indicateurs</h2>

<div class="kpi-container">
    <div class="kpi">Total<br><b id="kpi-total">0</b></div>
    <div class="kpi">Closed<br><b id="kpi-closed">0</b></div>
    <div class="kpi">WIP<br><b id="kpi-wip">0</b></div>
    <div class="kpi">To Start<br><b id="kpi-start">0</b></div>
    <div class="kpi">En retard<br><b id="kpi-late">0</b></div>
</div>

<h2 style="text-align:center;">Liste des tâches</h2>

<div id="loading" class="loading">Chargement des données...</div>
<div id="error" class="error" style="display:none;"></div>

<table id="task-table" style="display:none;">
<thead>
<tr>
    <th>N°</th>
    <th>Action</th>
    <th>Pilot</th>
    <th>Status</th>
    <th>Due date</th>
    <th>Done date</th>
    <th>Comment</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const API_URL = "https://script.google.com/a/macros/valeo.com/s/AKfycbz6wSQYbnv0JtgKkn36bvLLwrgfKnjv2XZwLKQ_cDMOckszv7-lNksaO0MhAVNb8sY9/exec";

async function loadData() {
    try {
        console.log("📥 Tentative de chargement des données...");
        
        const response = await fetch(API_URL, {
            method: "GET",
            mode: "no-cors"
        });

        // Avec no-cors, on ne peut pas accéder à response.json()
        // Donc on utilise une méthode alternative avec JSONP

        // Essayez d'abord avec fetch normal
        const response2 = await fetch(API_URL);
        const data = await response2.json();
        
        console.log("✅ Données reçues:", data);
        displayKPIs(data);
        displayTable(data);

    } catch (error) {
        console.error("❌ Erreur de chargement:", error);
        showError("Erreur lors du chargement des données. Vérifiez la console (F12).");
    }
}

function displayKPIs(data) {
    if (!Array.isArray(data)) {
        console.warn("Les données ne sont pas un array:", data);
        return;
    }

    const total = data.length;
    const closed = data.filter(t => t.Status === "Closed").length;
    const wip = data.filter(t => t.Status === "Work In Progress").length;
    const start = data.filter(t => t.Status === "To start").length;

    const late = data.filter(t => {
        if (!t["Due date"] || t.Status === "Closed") return false;
        const d = new Date(t["Due date"]);
        return d < new Date();
    }).length;

    document.getElementById("kpi-total").textContent = total;
    document.getElementById("kpi-closed").textContent = closed;
    document.getElementById("kpi-wip").textContent = wip;
    document.getElementById("kpi-start").textContent = start;
    document.getElementById("kpi-late").textContent = late;
}

function displayTable(data) {
    if (!Array.isArray(data)) return;

    const tbody = document.querySelector("#task-table tbody");
    tbody.innerHTML = "";

    data.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${row["N° Item"] || ""}</td>
            <td>${row["Action"] || ""}</td>
            <td>${row["Pilot"] || ""}</td>
            <td>${row["Status"] || ""}</td>
            <td>${row["Due date"] || ""}</td>
            <td>${row["Done date"] || ""}</td>
            <td>${row["Comment"] || ""}</td>
        `;
        tbody.appendChild(tr);
    });

    // Afficher le tableau et masquer le chargement
    document.getElementById("loading").style.display = "none";
    document.getElementById("task-table").style.display = "table";
}

function showError(message) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("error").textContent = message;
    document.getElementById("error").style.display = "block";
}

loadData();
</script>

</body>
</html>
