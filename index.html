<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard Projet</title>

<style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }
    header { background:#003366; color:white; padding:20px; text-align:center; }
    nav { background:#002244; padding:10px; text-align:center; }
    nav a { color:white; margin:0 20px; text-decoration:none; font-weight:bold; }

    .kpi-container { display:flex; justify-content:center; gap:20px; margin:30px; flex-wrap:wrap; }
    .kpi { background:white; padding:20px; width:180px; text-align:center; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }

    table { width:95%; margin:30px auto; border-collapse:collapse; background:white; border-radius:10px; overflow:hidden; }
    th, td { padding:10px; border-bottom:1px solid #ddd; }
    th { background:#003366; color:white; }

    .no-data { text-align:center; padding:30px; color:#666; font-size:16px; }
    .loading { text-align:center; padding:20px; color:#003366; font-weight:bold; }
    .sync-btn { 
        display: inline-block; 
        background:#28a745; 
        color:white; 
        padding:8px 15px; 
        border-radius:5px; 
        cursor:pointer; 
        margin:20px;
        border:none;
        font-weight:bold;
    }
    .sync-btn:hover { background:#218838; }
</style>
</head>

<body>

<header>
    <h1>Dashboard Projet</h1>
</header>

<nav>
    <a href="index.html">Dashboard</a>
    <a href="form.html">Ajouter un item</a>
</nav>

<div style="text-align:center;">
    <button class="sync-btn" onclick="syncFromGoogleSheet()">🔄 Synchroniser du Google Sheet</button>
</div>

<h2 style="text-align:center;">Indicateurs</h2>

<div class="kpi-container">
    <div class="kpi">Total<br><b id="kpi-total">0</b></div>
    <div class="kpi">Closed<br><b id="kpi-closed">0</b></div>
    <div class="kpi">WIP<br><b id="kpi-wip">0</b></div>
    <div class="kpi">To Start<br><b id="kpi-start">0</b></div>
    <div class="kpi">En retard<br><b id="kpi-late">0</b></div>
</div>

<h2 style="text-align:center;">Liste des tâches</h2>

<div id="loading" class="loading" style="display:none;">⏳ Chargement...</div>

<table id="task-table">
<thead>
<tr>
    <th>N°</th>
    <th>Action</th>
    <th>Pilot</th>
    <th>Status</th>
    <th>Due date</th>
    <th>Done date</th>
    <th>Comment</th>
</tr>
</thead>
<tbody id="table-body">
    <tr><td colspan="7" class="no-data">Aucun item pour le moment</td></tr>
</tbody>
</table>

<script>

const GOOGLE_SHEET_API = "https://script.google.com/a/macros/valeo.com/s/AKfycbyWiDKdeq7ax0omQO6ocqFJVnS0dmyAU8lHXtJJkTIRUT61ckkkUp1CfU2NDnz9zJdb/exec";

async function syncFromGoogleSheet() {
    const loadingDiv = document.getElementById("loading");
    loadingDiv.style.display = "block";
    loadingDiv.textContent = "⏳ Synchronisation en cours...";

    try {
        console.log("📥 Tentative de synchronisation depuis Google Sheet...");
        
        const response = await fetch(GOOGLE_SHEET_API, {
            method: "GET"
        });

        if (!response.ok) {
            throw new Error("Erreur réseau: " + response.status);
        }

        const data = await response.json();
        console.log("✅ Données reçues du Google Sheet:", data);

        // Sauvegarder dans localStorage
        localStorage.setItem('dashboardItems', JSON.stringify(data));
        localStorage.setItem('lastSync', new Date().toISOString());

        loadingDiv.textContent = "✅ Synchronisé!";
        setTimeout(() => {
            loadingDiv.style.display = "none";
            loadData();
        }, 1500);

    } catch (error) {
        console.error("❌ Erreur de synchronisation:", error);
        loadingDiv.textContent = "❌ Erreur: " + error.message + ". Utilisez les données locales.";
        setTimeout(() => {
            loadingDiv.style.display = "none";
        }, 3000);
    }
}

function loadData() {
    const data = JSON.parse(localStorage.getItem('dashboardItems')) || [];
    console.log("📊 Données chargées depuis localStorage:", data);
    displayKPIs(data);
    displayTable(data);
}

function displayKPIs(data) {
    const total = data.length;
    const closed = data.filter(t => t.Status === "Closed").length;
    const wip = data.filter(t => t.Status === "Work In Progress").length;
    const start = data.filter(t => t.Status === "To start").length;

    const late = data.filter(t => {
        if (!t["Due date"] || t.Status === "Closed") return false;
        const d = new Date(t["Due date"]);
        return d < new Date();
    }).length;

    document.getElementById("kpi-total").textContent = total;
    document.getElementById("kpi-closed").textContent = closed;
    document.getElementById("kpi-wip").textContent = wip;
    document.getElementById("kpi-start").textContent = start;
    document.getElementById("kpi-late").textContent = late;

    console.log(`📈 KPIs: Total=${total}, Closed=${closed}, WIP=${wip}, Start=${start}, Late=${late}`);
}

function displayTable(data) {
    const tbody = document.getElementById("table-body");
    
    if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="no-data">Aucun item - Cliquez sur "Synchroniser" pour charger les données</td></tr>';
        return;
    }

    tbody.innerHTML = "";

    data.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${row["N° Item"] || ""}</td>
            <td>${row["Action"] || ""}</td>
            <td>${row["Pilot"] || ""}</td>
            <td>${row["Status"] || ""}</td>
            <td>${row["Due date"] || ""}</td>
            <td>${row["Done date"] || ""}</td>
            <td>${row["Comment"] || ""}</td>
        `;
        tbody.appendChild(tr);
    });

    console.log(`✅ ${data.length} ligne(s) affichée(s)`);
}

// Au chargement: charger depuis localStorage
loadData();

// Rafraîchir toutes les 5 secondes
setInterval(loadData, 5000);

</script>

</body>
</html>
